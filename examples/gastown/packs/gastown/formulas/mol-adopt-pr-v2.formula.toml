# ──────────────────────────────────────────────────────────────────────
# Adopt PR formula — graph.v2 scoped workflow with inline Ralph loop
#
# Shape:
# - setup: preflight + rebase/worktree prep
# - body scope: Ralph review/fix loop
#   - each attempt: review fan-out (3 models) → synthesis → apply-fixes
#   - check script reads human verdict to gate iteration
# - finalize: push / CI / merge after approval
# - teardown: always clean worktree/refs
# ──────────────────────────────────────────────────────────────────────

description = """
Adopt PR using graph.v2 scoped workflow semantics.

Inline Ralph loop wraps a review fan-out (Claude + Codex + Gemini) with
synthesis and fix application. Human verdict check script gates iteration.
Scoped worktree setup/teardown via body scope.
"""
formula = "mol-adopt-pr-v2"
version = 2

[vars]
[vars.issue]
description = "Source bead ID for the PR adoption task"
required = true

[vars.base_branch]
description = "Target base branch"
default = "main"

[vars.remote_name]
description = "Git remote name"
default = "origin"

[vars.pr_ref]
description = "PR head ref to check out"
required = true

[vars.skip_gemini]
description = "Skip Gemini reviewer (dual-model mode)"
default = "false"

# ── Scope latch ──────────────────────────────────────────────────────

[[steps]]
id = "body"
title = "Adopt PR body scope"
needs = ["preflight", "rebase-check", "review-loop", "finalize"]
description = "Terminal latch for the adopt-pr body."
metadata = { "gc.kind" = "scope", "gc.scope_name" = "adopt-pr", "gc.scope_role" = "body" }

# ── Setup ────────────────────────────────────────────────────────────

[[steps]]
id = "preflight"
title = "Preflight repository and source bead"
description = """
Verify repo state and source bead metadata before mutating anything.

```bash
gc prime
bd prime
bd show {{issue}} --json | jq '.metadata'
git fetch --prune {{remote_name}}
git status --short
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope" }

[[steps]]
id = "rebase-check"
title = "Create worktree and verify rebaseability"
needs = ["preflight"]
description = """
Create or reuse the isolated worktree, record it on the source bead,
and verify the PR can be rebased onto the target branch.

```bash
WORKTREE=$(bd show {{issue}} --json | jq -r '.metadata.work_dir // empty')
if [ -z "$WORKTREE" ]; then
  WORKTREE_PATH=$(pwd)/worktrees/{{issue}}
  git worktree add "$WORKTREE_PATH" --detach {{remote_name}}/{{base_branch}}
  bd update {{issue}} --set-metadata work_dir="$WORKTREE_PATH"
  WORKTREE="$WORKTREE_PATH"
fi

cd "$WORKTREE"
git fetch --prune {{remote_name}}
git fetch {{remote_name}} {{pr_ref}}
git checkout -B adopt-pr/{{issue}} FETCH_HEAD
git rebase --autostash {{remote_name}}/{{base_branch}} --dry-run
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope" }

# ── Ralph review/fix loop ───────────────────────────────────────────
# The review-loop is a Ralph step with nested children.
# Each attempt materializes the children as a sub-DAG:
#   review-claude ─┐
#   review-codex  ─┼→ synthesize → apply-fixes
#   review-gemini ─┘
# The check script reads the human verdict from apply-fixes output.

[[steps]]
id = "review-loop"
title = "Review / fix loop"
needs = ["rebase-check"]
description = "Ralph container for the iterative review/fix cycle."
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope" }

[steps.ralph]
max_attempts = 5

[steps.ralph.check]
mode = "exec"
path = ".gc/scripts/checks/adopt-pr-review-approved.sh"
timeout = "10m"

# ── Ralph children: expand review-pr fragment + apply fixes ──────────
# expansion-review-pr provides: reviewers → synthesize (analysis only)
# The parent owns the fix/verdict step.

[[steps.children]]
id = "review-pipeline"
title = "Multi-model review pipeline"
description = "Expanded via compose.expand with expansion-review-pr"

[[steps.children]]
id = "apply-fixes"
title = "Apply review fixes and set verdict"
needs = ["review-pipeline"]
description = """
Read the synthesis report from the review pipeline. Apply fixes for all
blocker and major findings. Commit changes to the worktree branch.

After applying fixes, set the review verdict:

```bash
# If all blockers/majors addressed:
bd update $GC_BEAD_ID --set-metadata review.verdict=done

# If more iteration needed:
bd update $GC_BEAD_ID --set-metadata review.verdict=iterate
```
"""

[compose]
[[compose.expand]]
target = "review-pipeline"
with = "expansion-review-pr"
vars = { skip_gemini = "{skip_gemini}" }

# ── Finalize (after Ralph passes) ───────────────────────────────────

[[steps]]
id = "finalize"
title = "Push, observe CI, and merge"
needs = ["review-loop"]
description = """
Finalize after human approval passes the Ralph check.

Determine merge path from accumulated state:
- Path A: no maintainer commits → squash merge
- Path B: maintainer commits + edits enabled → squash contributors, merge commit
- Path C: maintainer commits + edits disabled → new PR from fork
- Path D: original PR already merged → follow-up PR for fixups

```bash
WORKTREE=$(bd show {{issue}} --json | jq -r '.metadata.work_dir // empty')
cd "$WORKTREE"
git push --force-with-lease {{remote_name}} HEAD
# observe CI, merge per path
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope" }

# ── Teardown (always runs) ──────────────────────────────────────────

[[steps]]
id = "cleanup-worktree"
title = "Clean up worktree and temporary refs"
needs = ["body"]
description = """
Always-run teardown after the body reaches terminal state.

```bash
WORKTREE=$(bd show {{issue}} --json | jq -r '.metadata.work_dir // empty')
if [ -n "$WORKTREE" ] && [ -d "$WORKTREE" ]; then
  git worktree remove --force "$WORKTREE" || rm -rf "$WORKTREE"
fi
bd update {{issue}} --unset-metadata work_dir
```
"""
metadata = { "gc.kind" = "cleanup", "gc.scope_ref" = "body", "gc.scope_role" = "teardown" }
