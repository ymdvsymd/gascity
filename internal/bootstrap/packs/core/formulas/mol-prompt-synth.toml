description = """
Generate a Gas City agent prompt template by reading a pre-rendered
meta-prompt and writing the model's response to a destination path.

This is the formula side of `gc prompt synth --writer-agent <name>`.
The CLI prepares the meta-prompt (provider/context/baseline-aware) on
disk, creates this bead with the relevant paths in metadata, and slings
the bead to the writer-agent. The agent's session executes the steps
below — read the meta-prompt, generate the prompt template, write it
to the destination, close the bead, drain.

## Variables

| Variable          | Source | Description                                              |
|-------------------|--------|----------------------------------------------------------|
| issue             | caller | The bead ID assigned to the writer-agent for this synth  |
| meta_prompt_path  | caller | Absolute path to the rendered meta-prompt file (input)   |
| dest_path         | caller | Absolute path where the generated prompt template goes   |
| synth_role        | caller | Name of the role being designed (for the trace header)   |

## Failure Modes

| Situation                          | Action                                                |
|------------------------------------|-------------------------------------------------------|
| meta_prompt_path does not exist    | Mail Witness, mark stuck, do not write a partial file |
| dest_path is unwritable            | Mail Witness, mark stuck, do not silently swallow     |
| Generated output is empty          | Re-run once; if still empty, mail Witness             |
"""
formula = "mol-prompt-synth"
version = 1

[vars]
[vars.issue]
description = "The bead ID assigned to the writer-agent for this synth"
required = true

[vars.meta_prompt_path]
description = "Absolute path to the rendered meta-prompt file (input)"
required = true

[vars.dest_path]
description = "Absolute path where the generated prompt template will be written"
required = true

[vars.synth_role]
description = "Role name being designed (used in the file header for traceability)"
required = true

[[steps]]
id = "read-meta-prompt"
title = "Read the meta-prompt that describes what to generate"
description = """
The meta-prompt at `{{meta_prompt_path}}` is a complete prompt-engineering
brief: it specifies the role being designed, the target provider, the
context (rig vs city), the available template variables, and a baseline
template to refine.

**1. Read it carefully:**
```bash
cat {{meta_prompt_path}}
```

**2. Confirm assignment:**
```bash
bd show {{issue}}
```

The bead's metadata records the same `synth_role`, `dest_path`, and
`meta_prompt_path` values that were passed as formula vars — use them
as the source of truth if there's any ambiguity.

**Exit criteria:** You have read and understood the meta-prompt; you
know the role being designed, the target provider, the context, and
the destination path."""

[[steps]]
id = "generate"
title = "Generate the prompt template per the meta-prompt's instructions"
needs = ["read-meta-prompt"]
description = """
Follow the meta-prompt's instructions exactly. The output is a Gas City
`.template.md` body — typically 50-200 lines, terse imperative, with
section headings, command snippets, and Gas City template placeholders
(`{{ "{{" }} .CityRoot }}`, `{{ "{{" }} templateFirst ... }}`, etc.) that
get substituted at session-render time.

**Constraints (re-stated for emphasis):**
- Output ONLY the markdown body. No code fences around the whole output,
  no preamble, no commentary.
- Preserve every Gas City template placeholder verbatim — they are NOT
  for you to substitute.
- If the meta-prompt provides a baseline marked "current prompt template",
  refine it; do not start from scratch.
- If the baseline is marked "structural reference", use its shape but
  rewrite content for the target role.

**Exit criteria:** You have generated the markdown body and are ready
to write it to disk."""

[[steps]]
id = "write-and-close"
title = "Write the generated prompt to dest_path, close the bead, drain"
needs = ["generate"]
description = """
**1. Prepend a trace header** so future readers know how this file got
here:

```
<!--
Generated by `gc prompt synth` (slingued mode) on YYYY-MM-DD via $GC_AGENT.
  role:     {{synth_role}}
  bead:     {{issue}}
LLM-generated content. Review carefully before relying on it.
-->

```

Replace `YYYY-MM-DD` with today's UTC date.

**2. Write the file** at `{{dest_path}}`. Use whichever file-write tool
your provider exposes (Write, edit_file, fs.write, etc.). Make sure the
parent directory exists; create it if not.

**3. Update the bead and close it:**
```bash
bd update {{issue}} --notes "Synthesized: {{dest_path}}"
bd close {{issue}}
```

**4. Drain and exit:**
```bash
gc runtime drain-ack
exit
```

**Exit criteria:** File exists at {{dest_path}} with the correct header
and body, bead is closed, drain-ack signaled, session exited."""
